openapi: "3.1.0"
info:
  title: DingDong RAG API
  version: "0.1.0"
  description: |
    Agentic Knowledge Graph RAG system API.
    This is the contract that the backend implements and the frontend consumes.

servers:
  - url: http://localhost:8000/api/v1
    description: Local development
  - url: https://api.dingdong-rag.com/api/v1
    description: Production

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns the health status of the API and its dependencies.
      tags:
        - System
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # --- Auth endpoints (Wave 2) ---
  /auth/register:
    post:
      operationId: register
      summary: Register a new user
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "409":
          description: Email already registered

  /auth/login:
    post:
      operationId: login
      summary: Authenticate user
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid credentials

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh access token
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid or expired refresh token

  /auth/me:
    get:
      operationId: getCurrentUser
      summary: Get current authenticated user
      tags:
        - Auth
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Not authenticated

  # --- Document endpoints (Wave 3) ---
  # /documents:
  # /documents/{id}:

  # --- Knowledge endpoints (Wave 4) ---
  # /knowledge/query:
  # /knowledge/graph/stats:

  # --- Agent endpoints (Wave 5) ---
  # /chat:
  # /chat/ws:

  # --- Ingestion endpoints (Wave 6, admin-only) ---
  # /admin/ingestion/trigger:
  # /admin/ingestion/status:

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
        - environment
      properties:
        status:
          type: string
          example: healthy
        version:
          type: string
          example: "0.1.0"
        environment:
          type: string
          example: development

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - full_name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        full_name:
          type: string
          minLength: 1

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - token_type
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: bearer

    UserResponse:
      type: object
      required:
        - id
        - email
        - full_name
        - is_active
        - created_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []

tags:
  - name: System
    description: Health checks and system status
  - name: Auth
    description: Authentication and authorization
  - name: Documents
    description: File upload and management
  - name: Knowledge
    description: Knowledge Graph and retrieval
  - name: Chat
    description: Agentic RAG conversation
  - name: Admin
    description: Admin-only operations (ingestion)
