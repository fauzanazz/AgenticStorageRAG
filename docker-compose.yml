# DriveRAG - Local Development
#
# Two modes:
#   make dev          → Full local stack (Postgres + Neo4j + Redis + backend + worker + frontend)
#   make dev-supabase → Supabase for DB/vector (Neo4j + Redis + backend + worker + frontend)
#
# Or directly:
#   docker compose --profile local up --build
#   docker compose --profile supabase up --build

services:
  # ====================================================================
  # Infrastructure (always runs)
  # ====================================================================

  # --- Neo4j (separate database for this project) ---
  # Uses ports 17474/17687 to avoid conflicts with other Neo4j instances
  neo4j:
    image: neo4j:5-community
    ports:
      - "127.0.0.1:17474:7474"   # Browser → http://localhost:17474
      - "127.0.0.1:17687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-dingdong_dev}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_initial_dbms_default__database=dingdongrag
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "neo4j status || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # --- Redis ---
  # Uses port 16379 on the host to avoid conflicts with other Redis instances
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ====================================================================
  # Profile: local (full local stack with Postgres)
  # ====================================================================

  postgres:
    image: pgvector/pgvector:pg17
    profiles: ["local"]
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-dingdong_rag}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend-local:
    build:
      context: ./backend
      target: development
    profiles: ["local"]
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-dingdong_rag}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-dingdong_dev}
      - NEO4J_DATABASE=dingdongrag
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_ORIGINS=["http://localhost:3000"]
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-local:
    build:
      context: ./backend
      target: development
    profiles: ["local"]
    command: >
      python -m celery -A app.celery_app worker
      --loglevel=info
      --queues=documents,ingestion
      --concurrency=4
      --pool=threads
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-dingdong_rag}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-dingdong_dev}
      - NEO4J_DATABASE=dingdongrag
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend-local:
    build:
      context: ./frontend
      target: development
    profiles: ["local"]
    ports:
      - "127.0.0.1:3000:3000"
    command: ["npx", "next", "dev", "--webpack"]
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend-local
    restart: unless-stopped

  # ====================================================================
  # Profile: supabase (uses Supabase for DB/vector via .env)
  # ====================================================================

  backend-supabase:
    build:
      context: ./backend
      target: development
    profiles: ["supabase"]
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-dingdong_dev}
      - NEO4J_DATABASE=dingdongrag
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_ORIGINS=["http://localhost:3000"]
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-supabase:
    build:
      context: ./backend
      target: development
    profiles: ["supabase"]
    command: >
      python -m celery -A app.celery_app worker
      --loglevel=info
      --queues=documents,ingestion
      --concurrency=4
      --pool=threads
    deploy:
      resources:
        limits:
          memory: 4G
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-dingdong_dev}
      - NEO4J_DATABASE=dingdongrag
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend-supabase:
    build:
      context: ./frontend
      target: development
    profiles: ["supabase"]
    ports:
      - "127.0.0.1:3000:3000"
    command: ["npx", "next", "dev", "--webpack"]
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend-supabase
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
